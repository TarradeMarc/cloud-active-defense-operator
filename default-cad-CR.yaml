apiVersion: operator.sundew.com/v1alpha1 
kind: CloudActiveDefense 
metadata: 
  labels: 
    app.kubernetes.io/name: cloud-active-defense
    app.kubernetes.io/instance: cad-module
    app.kubernetes.io/part-of: tmpoperator 
    app.kubernetes.io/managed-by: kustomize 
    app.kubernetes.io/created-by: tmpoperator 
  name: cad-module
  namespace: default
spec:
  # domain is now auto-detected from the Kyma cluster
  # Uncomment the following line to override with a custom domain:
  # domain: my-custom.domain.com
  controlpanelAPI:
    image: ghcr.io/sap/controlpanel-api:latest
    deploymentManagerDBPassword: 
  controlpanelFront:
    image: ghcr.io/sap/controlpanel-frontend:latest
  deploymentManager:
    image: ghcr.io/sap/deployment-manager:latest
  keycloak:
    image: ghcr.io/sap/keycloak-controlpanel:latest
    database:
      port: 5432
  database:
    port: 5432

